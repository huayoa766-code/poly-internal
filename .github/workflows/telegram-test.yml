name: telegram-test

# Manually-triggered: sends one test message to TELEGRAM_CHAT_ID so you can
# verify production Telegram delivery (e.g. after pointing it at a group).
on:
  workflow_dispatch: {}

jobs:
  telegram-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run telegram:test
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
